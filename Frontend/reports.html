<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - CareTrack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/tables.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="assets/img/caretrack-logo.svg" alt="CareTrack">
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Injected via layout.js -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Reports</h1>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search reports...">
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon"><i class="fas fa-bell"></i></button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="topbar-user-name">User</span>
                            <span class="user-role" id="topbar-user-role">Role</span>
                        </div>
                        <div class="avatar" id="topbar-avatar">U</div>
                    </div>
                </div>
            </header>

            <div class="page-container">
                <div class="page-header">
                    <div>
                        <h2>Patient Reports</h2>
                        <p class="text-muted">Manage and view generated patient reports</p>
                    </div>
                </div>

                <!-- Reports Table -->
                <div class="glass-card">
                    <div class="table-container">
                        <table class="table" id="reports-table">
                            <thead>
                                <tr>
                                    <th>Report ID</th>
                                    <th>Patient Name</th>
                                    <th>Type</th>
                                    <th>Date & Time</th>
                                    <th>Created By</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated via JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/reports.js"></script>
</body>
</html>
