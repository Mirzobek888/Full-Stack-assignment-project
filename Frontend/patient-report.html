<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Report - CareTrack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/tables.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .report-page {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 8px;
            min-height: 1122px; /* Approx A4 */
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .clinic-info h2 { color: #000; margin:0 0 4px 0; }
        .clinic-info p { margin: 0; font-size: 14px; color: #555; }
        .report-title { text-align: right; }
        .report-title h1 { color: #000; font-size: 24px; margin:0 0 8px 0; text-transform: uppercase; }
        .report-title p { margin: 0; font-size: 14px; color: #555; }
        
        .patient-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border: 1px solid #ddd;
        }
        .patient-info p { margin: 4px 0; font-size: 14px; color: #000; }
        .patient-info strong { display: inline-block; width: 120px; color: #555; }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .report-table th, .report-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            color: #000;
        }
        .report-table th {
            background: #f0f0f0;
            font-weight: bold;
        }
        
        .print-button {
            text-align: center;
            margin: 30px 0;
        }
        .print-button button {
            background: #07111f;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .print-button button:hover {
            background: #19d3c5;
            color: #000;
        }

        @media print {
            body { background: white; }
            .print-button { display: none; }
            .topbar, .sidebar, .mobile-menu-btn { display: none !important; }
            #app { display: block; }
            .main-content { margin-left: 0; }
            .report-page { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="assets/img/caretrack-logo.svg" alt="CareTrack">
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Injected via layout.js -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Patient Report</h1>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon"><i class="fas fa-bell"></i></button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="topbar-user-name">User</span>
                            <span class="user-role" id="topbar-user-role">Role</span>
                        </div>
                        <div class="avatar" id="topbar-avatar">U</div>
                    </div>
                </div>
            </header>

            <div class="page-container">
                <div class="report-page" id="report-content">
                    <div class="print-button">
                        <button onclick="window.print()"><i class="fas fa-print"></i> Print Report</button>
                    </div>
                    <!-- Report content loaded via JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            auth.requireAuth();
            layout.init();
            
            const params = new URLSearchParams(window.location.search);
            const patientId = params.get('id');
            
            if (!patientId) {
                document.getElementById('report-content').innerHTML = '<p>Patient ID not provided</p>';
                return;
            }

            try {
                const patients = await api.get('/patients');
                const patient = patients.find(p => p.id === patientId);
                
                if (!patient) {
                    document.getElementById('report-content').innerHTML = '<p>Patient not found</p>';
                    return;
                }

                const diagnoses = await api.get('/diagnoses');
                const patientDiagnoses = diagnoses.filter(d => d.patientId === patientId);

                const reportHtml = `
                    <div class="report-header">
                        <div class="clinic-info">
                            <h2>CareTrack Medical Records System</h2>
                            <p>Patient Medical Report</p>
                        </div>
                        <div class="report-title">
                            <h1>Medical Report</h1>
                            <p>Generated on: ${new Date().toLocaleDateString()}</p>
                        </div>
                    </div>

                    <div class="patient-section">
                        <div class="patient-info">
                            <p><strong>Patient ID:</strong> ${patient.id}</p>
                            <p><strong>Name:</strong> ${patient.firstName} ${patient.lastName}</p>
                            <p><strong>DOB:</strong> ${layout.formatDate(patient.dateOfBirth)}</p>
                            <p><strong>Age:</strong> ${layout.calculateAge(patient.dateOfBirth)}</p>
                        </div>
                        <div class="patient-info">
                            <p><strong>Gender:</strong> ${patient.gender || 'N/A'}</p>
                            <p><strong>Phone:</strong> ${patient.phoneNumber || 'N/A'}</p>
                            <p><strong>Email:</strong> ${patient.email || 'N/A'}</p>
                            <p><strong>Department:</strong> ${patient.department || 'N/A'}</p>
                        </div>
                    </div>

                    <h3>Medical History</h3>
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>ICD Code</th>
                                <th>Description</th>
                                <th>Severity</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${patientDiagnoses.length > 0 ? patientDiagnoses.map(d => `
                                <tr>
                                    <td>${d.icdCode || d.id}</td>
                                    <td>${d.description}</td>
                                    <td>${d.severity}</td>
                                    <td>${layout.formatDate(d.diagnosisDate)}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="4" style="text-align:center;">No diagnoses on record</td></tr>'}
                        </tbody>
                    </table>

                    <p style="margin-top: 40px; font-size: 12px; color: #666; border-top: 1px solid #ddd; padding-top: 20px;">
                        This report was generated by the CareTrack Medical Records Management System on ${new Date().toLocaleString()}.
                    </p>
                `;

                document.getElementById('report-content').innerHTML = reportHtml;
            } catch (error) {
                console.error('Error loading report:', error);
                document.getElementById('report-content').innerHTML = '<p>Error loading patient report. Please try again.</p>';
                layout.showToast('Failed to load report', 'error');
            }
        });
    </script>
</body>
</html>
