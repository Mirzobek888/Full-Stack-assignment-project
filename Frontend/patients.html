<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - CareTrack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <link rel="stylesheet" href="assets/css/tables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="assets/img/caretrack-logo.svg" alt="CareTrack">
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">Patients</h1>
                </div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="topbar-user-name"></span>
                            <span class="user-role" id="topbar-user-role"></span>
                        </div>
                        <div class="avatar" id="topbar-avatar"></div>
                    </div>
                </div>
            </header>

            <div class="page-container">
                <div class="section-header">
                    <div>
                        <h2>Manage Patients</h2>
                        <p class="text-muted">View, register, and manage patient records</p>
                    </div>
                    <a href="patient-form.html" class="btn-primary" id="register-patient-btn" style="display:none;"><i class="fas fa-plus"></i> Register Patient</a>
                </div>

                <div class="glass-card" style="margin-bottom: 24px;">
                    <div class="form-row">
                        <div class="search-box form-col" style="width:100%;">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-input" placeholder="Search patients by name, ID, or phone">
                        </div>
                        <select class="form-control form-col" id="filter-dept" style="max-width: 200px;">
                            <option value="">All Departments</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="Orthopaedics">Orthopaedics</option>
                            <option value="General Practice">General Practice</option>
                        </select>
                        <select class="form-control form-col" id="filter-status" style="max-width: 200px;">
                            <option value="">All Statuses</option>
                            <option value="Stable">Stable</option>
                            <option value="Monitoring">Monitoring</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="table-container">
                        <table class="table" id="patients-table">
                            <thead>
                                <tr>
                                    <th>Patient ID</th>
                                    <th>Name</th>
                                    <th>Age</th>
                                    <th>Gender</th>
                                    <th>Assigned Doctor</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/patients.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (auth.hasRole(['administrator', 'receptionist'])) {
                document.getElementById('register-patient-btn').style.display = 'inline-flex';
            }
        });
    </script>
</body>
</html>
