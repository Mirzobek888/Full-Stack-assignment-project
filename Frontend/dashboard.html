<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CareTrack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/tables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="assets/img/caretrack-logo.svg" alt="CareTrack">
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Injected via layout.js -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Dashboard</h1>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="dashboard-search" placeholder="Quick search...">
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon"><i class="fas fa-bell"></i></button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="topbar-user-name">User</span>
                            <span class="user-role" id="topbar-user-role">Role</span>
                        </div>
                        <div class="avatar" id="topbar-avatar">U</div>
                    </div>
                </div>
            </header>

            <div class="page-container">
                <div style="margin-bottom: 24px;">
                    <h2>Welcome back, <span id="welcome-name" class="text-teal"></span>!</h2>
                    <p class="text-muted">Here is the latest overview of your clinic's activities.</p>
                </div>

                <!-- Admin & Doctor Stats -->
                <div class="dashboard-grid" id="stats-container">
                    <!-- Populated via JS -->
                </div>

                <div class="dashboard-sections">
                    <div class="section-main">
                        <!-- Quick Actions based on Role -->
                        <div class="section-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="quick-actions" id="quick-actions">
                            <!-- Populated via JS -->
                        </div>

                        <!-- Recent Patients Table (Admin, Doctor, Receptionist) -->
                        <div class="glass-card" style="margin-bottom: 24px;">
                            <div class="section-header">
                                <h3>Recent Patients</h3>
                                <a href="patients.html" class="btn-secondary">View All</a>
                            </div>
                            <div class="table-container">
                                <table class="table" id="recent-patients-table">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Dept</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Populated via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="section-side">
                        <!-- Recent Activity / Diagnoses -->
                        <div class="glass-card" style="height: 100%;">
                            <div class="section-header">
                                <h3 id="side-feed-title">Recent Activity</h3>
                            </div>
                            <div class="activity-timeline" id="recent-activity-feed">
                                <!-- Populated via JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
