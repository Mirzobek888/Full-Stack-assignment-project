<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile - CareTrack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/tables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--teal), var(--cyan));
            color: #000;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-info h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }
        .profile-info p {
            color: var(--muted);
            margin: 4px 0;
            font-size: 14px;
        }
        .profile-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }
        .info-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .info-value {
            font-size: 15px;
            color: #fff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="assets/img/caretrack-logo.svg" alt="CareTrack">
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">Patient Profile</h1>
                </div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name" id="topbar-user-name"></span>
                            <span class="user-role" id="topbar-user-role"></span>
                        </div>
                        <div class="avatar" id="topbar-avatar"></div>
                    </div>
                </div>
            </header>

            <div class="page-container" id="profile-content" style="display:none;">
                <div class="profile-header">
                    <div class="profile-avatar" id="pat-avatar"></div>
                    <div class="profile-info">
                        <h1 id="pat-name"></h1>
                        <p><span id="pat-id"></span> • <span id="pat-age"></span> years old • <span id="pat-gender"></span></p>
                        <p><span class="badge" id="pat-status"></span></p>
                    </div>
                    <div class="profile-actions">
                        <button id="generate-report-btn" class="btn-secondary" style="display:none;"><i class="fas fa-file-pdf"></i> Generate Report</button>
                        <a href="#" id="edit-pat-btn" class="btn-primary" style="display:none;">Edit Patient</a>
                    </div>
                </div>

                <div class="dashboard-sections">
                    <div class="section-main">
                        <div class="glass-card" style="margin-bottom: 24px;">
                            <h3 style="margin-bottom: 20px;">Personal Information</h3>
                            <div class="info-grid">
                                <div><div class="info-label">Phone</div><div class="info-value" id="pat-phone"></div></div>
                                <div><div class="info-label">Email</div><div class="info-value" id="pat-email"></div></div>
                                <div><div class="info-label">Address</div><div class="info-value" id="pat-address"></div></div>
                                <div><div class="info-label">Registered</div><div class="info-value" id="pat-created"></div></div>
                            </div>
                            
                            <h3 style="margin-top: 24px; margin-bottom: 20px; border-top: 1px solid var(--border-soft); padding-top: 20px;">Emergency Contact</h3>
                            <div class="info-grid">
                                <div><div class="info-label">Name</div><div class="info-value" id="pat-emer-name"></div></div>
                                <div><div class="info-label">Phone</div><div class="info-value" id="pat-emer-phone"></div></div>
                            </div>
                        </div>

                        <div class="glass-card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                                <h3 style="margin:0;">Diagnosis History</h3>
                                <a href="#" id="add-diagnosis-btn" class="btn-primary" style="display:none; font-size: 12px; padding: 6px 12px;"><i class="fas fa-plus"></i> Add</a>
                            </div>
                            <div class="table-container">
                                <table class="table" id="diagnoses-table">
                                    <thead>
                                        <tr>
                                            <th>ICD Code</th>
                                            <th>Description</th>
                                            <th>Severity</th>
                                            <th>Date</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="section-side">
                        <div class="glass-card">
                            <h3 style="margin-bottom: 20px;">Assigned Doctor</h3>
                            <div id="assigned-doc-card">
                                <!-- JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            auth.requireAuth();
            layout.init();

            const urlParams = new URLSearchParams(window.location.search);
            const patId = urlParams.get('id');

            if (!patId) {
                window.location.href = 'patients.html';
                return;
            }

            if (auth.hasRole(['administrator', 'clinician'])) {
                document.getElementById('edit-pat-btn').style.display = 'inline-block';
                document.getElementById('edit-pat-btn').href = `patient-form.html?id=${patId}`;
                document.getElementById('add-diagnosis-btn').style.display = 'inline-block';
                document.getElementById('add-diagnosis-btn').href = `diagnosis-form.html?patientId=${patId}`;
                document.getElementById('generate-report-btn').style.display = 'inline-block';
            }

            document.getElementById('generate-report-btn').addEventListener('click', async () => {
                try {
                    await api.post(`/reports/patient/${patId}`, { type: 'Summary', notes: 'Generated from patient profile.' });
                    layout.showToast('Report generated successfully');
                    setTimeout(() => {
                        window.location.href = `patient-report.html?id=${patId}`;
                    }, 1000);
                } catch(e) {
                    layout.showToast('Failed to generate report', 'error');
                }
            });

            try {
                const pat = await api.get(`/patients/${patId}`);
                
                document.getElementById('pat-avatar').textContent = layout.getAvatarInitials(`${pat.firstName} ${pat.lastName}`);
                document.getElementById('pat-name').textContent = `${pat.firstName} ${pat.lastName}`;
                document.getElementById('pat-id').textContent = pat.id;
                document.getElementById('pat-age').textContent = layout.calculateAge(pat.dateOfBirth);
                document.getElementById('pat-gender').textContent = pat.gender;
                
                const statusEl = document.getElementById('pat-status');
                statusEl.textContent = pat.status;
                if(pat.status === 'Critical') statusEl.className = 'badge badge-critical';
                else if(pat.status === 'Monitoring') statusEl.className = 'badge badge-warning';
                else statusEl.className = 'badge badge-success';

                document.getElementById('pat-phone').textContent = pat.phone;
                document.getElementById('pat-email').textContent = pat.email || '-';
                document.getElementById('pat-address').textContent = pat.address || '-';
                document.getElementById('pat-created').textContent = layout.formatDate(pat.createdAt);
                
                document.getElementById('pat-emer-name').textContent = pat.emergencyContactName || '-';
                document.getElementById('pat-emer-phone').textContent = pat.emergencyContactPhone || '-';

                // Load Doctor
                if (pat.assignedDoctorId) {
                    const doc = await api.get(`/doctors/${pat.assignedDoctorId}`);
                    document.getElementById('assigned-doc-card').innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                            <div class="avatar" style="width:48px; height:48px; font-size:18px;">${layout.getAvatarInitials(doc.fullName)}</div>
                            <div>
                                <div style="font-weight:600; color:#fff;">${doc.fullName}</div>
                                <div style="font-size:13px; color:var(--teal);">${doc.specialty}</div>
                            </div>
                        </div>
                        <div style="font-size:13px; color:var(--muted);">
                            <p style="margin:4px 0;"><i class="fas fa-building" style="width:20px;"></i> ${doc.department}</p>
                            <p style="margin:4px 0;"><i class="fas fa-phone" style="width:20px;"></i> ${doc.phone}</p>
                        </div>
                    `;
                }

                // Load Diagnoses
                const allDiags = await api.get('/diagnoses');
                const patDiags = allDiags.filter(d => d.patientId === patId).sort((a,b) => new Date(b.diagnosisDate) - new Date(a.diagnosisDate));
                
                const tbody = document.querySelector('#diagnoses-table tbody');
                tbody.innerHTML = patDiags.map(d => `
                    <tr>
                        <td style="font-weight:600;">${d.icdCode}</td>
                        <td>${d.description}</td>
                        <td><span class="badge ${d.severity === 'Critical' ? 'badge-critical' : d.severity === 'High' ? 'badge-danger' : d.severity === 'Medium' ? 'badge-warning' : 'badge-success'}">${d.severity}</span></td>
                        <td>${layout.formatDate(d.diagnosisDate)}</td>
                        <td>
                            <a href="diagnosis-detail.html?id=${d.id}" class="btn-secondary" style="padding: 6px 14px; font-size: 12px;">View</a>
                        </td>
                    </tr>
                `).join('');

                if(patDiags.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px; color:var(--muted);">No diagnosis records found</td></tr>`;
                }

                document.getElementById('profile-content').style.display = 'block';

            } catch (err) {
                layout.showToast('Failed to load patient profile', 'error');
            }
        });
    </script>
</body>
</html>
